services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: noveluser
      POSTGRES_PASSWORD: novelpass
      POSTGRES_DB: noveldb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

volumes:
  pgdata:
