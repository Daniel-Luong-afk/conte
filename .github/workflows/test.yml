name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TEST_DATABASE_URL: postgresql://noveluser:novelpass@localhost:5432/noveldb_test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres: 16
        env:
          POSTGRES_USER: noveluser
          POSTGRES_PASSWORD: novelpass
          POSTGRES_DB: noveldb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5