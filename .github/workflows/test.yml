name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TEST_DATABASE_URL: postgresql://noveluser:novelpass@localhost:5432/noveldb_test
  DATABASE_URL: postgresql://noveluser:novelpass@localhost:5432/noveldb_test
  REDIS_URL: redis://localhost:6379
  VAPID_SUBJECT: mailto:test@test.com
  VAPID_PUBLIC_KEY: BEl62iUYgUivxIkv69yViEuiBIa-Ib9-SkvMeAtA3LFgDzkrxZJjSgSnfckjBJuBkr3qBLViMsRngJZwHRa5WqM
  VAPID_PRIVATE_KEY: test-private-key-placeholder

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: noveluser
          POSTGRES_PASSWORD: novelpass
          POSTGRES_DB: noveldb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @conte/api exec prisma generate

      - name: Run migrations
        run: pnpm --filter @conte/api exec prisma migrate deploy

      - name: Run tests
        run: pnpm --filter @conte/api test
